<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本能一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  font-size: 26px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

input,
select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.count {
  margin-bottom: 10px;
  color: #555;
}

.card {
  background: white;
  border-radius: 10px;

  padding: 12px 16px;
  margin-bottom: 12px;

  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.char-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.char-img {
  width: 72px;
  height: 72px;
  object-fit: contain;
  flex-shrink: 0;
}

.name {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 3px;
}

.meta {
  color: #666;
  font-size: 15px;
}

.talent-area {
  margin-top: 6px;
}

.section-title {
  font-weight: bold;
  margin: 5px 0;
  font-size: 15px;
}

.talent-row {
  display: flex;
  gap: 9px;

  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;

  padding: 2px 0 8px;
}

.talent {
  width: 132px;
  height: 64px;

  flex: 0 0 auto;

  background: #f1f1f1;
  border-radius: 9px;

  padding: 7px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  box-sizing: border-box;
}

.super {
  background: #fff0d6;
}

.talent-name {
  font-size: 13px;
  font-weight: bold;
  line-height: 1.15;
}

.talent-np {
  margin-top: 5px;
  font-size: 12px;
  color: #666;
}
  
.empty {
  color: #999;
}

@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    padding: 12px;
  }

  .char-img {
    width: 64px;
    height: 64px;
  }

  .name {
    font-size: 18px;
  }

  .talent {
    width: 135px;
    height: 68px;
  }

  .talent-name {
    font-size: 13px;
  }

  .talent-np {
    font-size: 12px;
  }
}

  #topButton {
  position: fixed;
  right: 18px;
  bottom: 18px;

  width: 52px;
  height: 52px;

  border: none;
  border-radius: 50%;

  background: #4CAF50;
  color: white;

  font-size: 24px;
  font-weight: bold;

  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);

  z-index: 9999;
}

#topButton:active {
  transform: scale(0.95);
}

  .hit-talent {
  border: 3px solid #ff3b30;
  box-sizing: border-box;
}

  .np-summary {
  background: #fff;
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 10px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.08);
  font-size: 15px;
  line-height: 1.7;
}

.np-summary strong {
  font-size: 16px;
}
</style>
</head>

<body>

<h1>本能一覧</h1>

<div class="controls">
  <input type="text" id="charSearchInput" placeholder="キャラ名で検索">
  <input type="text" id="talentSearchInput" placeholder="本能・超本能で検索">  

  <select id="rarityFilter">
    <option value="">全レアリティ</option>
  </select>
</div>

<div id="npSummary" class="np-summary"></div>

<div class="count" id="countText"></div>

<div id="list"></div>

<script>
let characters = [];

fetch("talents.json")
  .then(res => res.json())
  .then(data => {
    characters = data;
    setupRarityFilter();
    renderList();
  })
  .catch(err => {
    document.getElementById("list").innerHTML =
      "<p class='empty'>talents.json を読み込めませんでした。</p>";
    console.error(err);
  });

document.getElementById("charSearchInput").addEventListener("input", renderList);
document.getElementById("talentSearchInput").addEventListener("input", renderList);
document.getElementById("rarityFilter").addEventListener("change", renderList);

function setupRarityFilter() {
  const select = document.getElementById("rarityFilter");

  const rarities = [...new Set(
    characters
      .map(c => c["レアリティ"])
      .filter(r => r !== "")
  )];

  rarities.forEach(rarity => {
    const option = document.createElement("option");
    option.value = rarity;
    option.textContent = rarity;
    select.appendChild(option);
  });
}

function renderList() {
  const list = document.getElementById("list");
  const charSearch = normalizeText(
  document.getElementById("charSearchInput").value
);

const talentSearch = normalizeText(
  document.getElementById("talentSearchInput").value
);

const rarity = document.getElementById("rarityFilter").value;

  list.innerHTML = "";

  const filtered = characters.filter(char => {

  if (rarity && char["レアリティ"] !== rarity) {
    return false;
  }

  // キャラ検索対象
  const charText = normalizeText([
    char["ID"],
    char["キャラ名"],
    char["レアリティ"]
  ].join(" "));

  // 本能検索対象
  const talentText = normalizeText([
    ...(char["本能"] || []).map(t => t["能力名"]),
    ...(char["本能"] || []).map(t => t["消費NP"]),
    ...(char["超本能"] || []).map(t => t["能力名"]),
    ...(char["超本能"] || []).map(t => t["消費NP"])
  ].join(" "));

  // キャラ検索欄に入力がある場合
  if (charSearch && !charText.includes(charSearch)) {
    return false;
  }

  // 本能検索欄に入力がある場合
  if (talentSearch && !talentText.includes(talentSearch)) {
    return false;
  }

  return true;
});

  updateNpSummary(filtered);

  document.getElementById("countText").textContent =
    `${filtered.length}件表示`;

  if (filtered.length === 0) {
    list.innerHTML = "<p class='empty'>該当するキャラがありません。</p>";
    return;
  }

  filtered.forEach(char => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="char-header">
        <img
          class="char-img"
          src="${escapeHtml(char["画像名"])}"
          alt="${escapeHtml(char["キャラ名"])}"
          onerror="this.src='image/noimage.png'"
        >

        <div class="char-info">
          <div class="name">${escapeHtml(char["キャラ名"])}</div>
          <div class="meta">
            合計NP：${getCharacterTotalNp(char).toLocaleString()} NP
          </div>
        </div>
      </div>

      <div class="talent-area">
        ${makeTalentHtml("本能", char["本能"], false, talentSearch)}
        ${char["超本能"]
          ? makeTalentHtml("超本能", char["超本能"], true, talentSearch)
          : ""}
      </div>
    `;

    list.appendChild(card);
  });
}

  function sumNpText(npText) {
  return String(npText ?? "")
    .split(",")
    .map(v => Number(v.trim()))
    .filter(v => !isNaN(v))
    .reduce((sum, v) => sum + v, 0);
}

  function getCharacterTotalNp(char) {
  const talents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return talents.reduce((sum, t) => {
    return sum + sumNpText(t["消費NP"]);
  }, 0);
}

function isResistanceTalent(name) {
  const text = normalizeText(name);

  // ○○耐性を除外
  // 例：赤い敵耐性、浮いてる敵耐性、エイリアン耐性 など
  return text.includes("耐性");
}

function updateNpSummary(targetCharacters) {
  const rarity = document.getElementById("rarityFilter").value;
  const summary = document.getElementById("npSummary");

  let totalNp = 0;
  let totalNpWithoutResistance = 0;

  targetCharacters.forEach(char => {
    const talents = [
      ...(char["本能"] || []),
      ...(char["超本能"] || [])
    ];

    talents.forEach(t => {
      const np = sumNpText(t["消費NP"]);
      const name = t["能力名"];

      totalNp += np;

      if (!isResistanceTalent(name)) {
        totalNpWithoutResistance += np;
      }
    });
  });

  const rarityText = rarity ? rarity : "全レアリティ";

  summary.innerHTML = `
    <strong>${escapeHtml(rarityText)}</strong><br>
    全ての本能NP合計：${totalNp.toLocaleString()} NP<br>
    ○○耐性以外の本能NP合計：${totalNpWithoutResistance.toLocaleString()} NP
  `;
}

function makeTalentHtml(title, talents, isSuper = false, talentSearch = "") {

  if (!talents || talents.length === 0) {
    return "";
  }

  let html = `
    <div class="section-title">${title}</div>
    <div class="talent-row">
  `;

  talents.forEach(t => {

    const talentName = normalizeText(t["能力名"]);
    const npText = normalizeText(t["消費NP"]);

    // 検索ヒット判定
    const isHit =
      talentSearch &&
      (
        talentName.includes(talentSearch) ||
        npText.includes(talentSearch)
      );

    html += `
      <div class="
        talent
        ${isSuper ? "super" : ""}
        ${isHit ? "hit-talent" : ""}
      ">
        <div class="talent-name">
          ${escapeHtml(t["能力名"])}
        </div>

        <div class="talent-np">
          NP:${escapeHtml(t["消費NP"])}
        </div>
      </div>
    `;
  });

  html += `</div>`;

  return html;
}

  function normalizeText(text) {
  return String(text ?? "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[‐-‒–—―ー]/g, "-");
}

function escapeHtml(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

  function scrollToTop() {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}
</script>

<button id="topButton" onclick="scrollToTop()">↑</button>
</body>
</html>
