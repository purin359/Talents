<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本能一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  font-size: 26px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

input,
select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.count {
  margin-bottom: 10px;
  color: #555;
}

.card {
  background: white;
  border-radius: 10px;

  padding: 12px 16px;
  margin-bottom: 12px;

  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.char-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.char-img {
  width: 72px;
  height: 72px;
  object-fit: contain;
  flex-shrink: 0;
}

.name {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 3px;
}

.meta {
  color: #666;
  font-size: 15px;
}

.talent-area {
  margin-top: 6px;
}

.section-title {
  font-weight: bold;
  margin: 5px 0;
  font-size: 15px;
}

.talent-row {
  display: flex;
  gap: 9px;

  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;

  padding: 2px 0 8px;
}

.talent {
  width: 132px;
  height: 64px;

  flex: 0 0 auto;

  background: #f1f1f1;
  border-radius: 9px;

  padding: 7px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  box-sizing: border-box;
}

.super {
  background: #fff0d6;
}

.talent-name {
  font-size: 13px;
  font-weight: bold;
  line-height: 1.15;
}

.talent-np {
  margin-top: 5px;
  font-size: 12px;
  color: #666;
}
  
.empty {
  color: #999;
}

@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    padding: 12px;
  }

  .char-img {
    width: 64px;
    height: 64px;
  }

  .name {
    font-size: 18px;
  }

  .talent {
    width: 135px;
    height: 68px;
  }

  .talent-name {
    font-size: 13px;
  }

  .talent-np {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<h1>本能一覧</h1>

<div class="controls">
  <input type="text" id="searchInput" placeholder="キャラ名・能力名で検索">

  <select id="rarityFilter">
    <option value="">全レアリティ</option>
  </select>
</div>

<div class="count" id="countText"></div>

<div id="list"></div>

<script>
let characters = [];

fetch("talents.json")
  .then(res => res.json())
  .then(data => {
    characters = data;
    setupRarityFilter();
    renderList();
  })
  .catch(err => {
    document.getElementById("list").innerHTML =
      "<p class='empty'>talents.json を読み込めませんでした。</p>";
    console.error(err);
  });

document.getElementById("searchInput").addEventListener("input", renderList);
document.getElementById("rarityFilter").addEventListener("change", renderList);

function setupRarityFilter() {
  const select = document.getElementById("rarityFilter");

  const rarities = [...new Set(
    characters
      .map(c => c["レアリティ"])
      .filter(r => r !== "")
  )];

  rarities.forEach(rarity => {
    const option = document.createElement("option");
    option.value = rarity;
    option.textContent = rarity;
    select.appendChild(option);
  });
}

function renderList() {
  const list = document.getElementById("list");
  const search = document.getElementById("searchInput").value.trim();
  const rarity = document.getElementById("rarityFilter").value;

  list.innerHTML = "";

  const filtered = characters.filter(char => {
    if (rarity && char["レアリティ"] !== rarity) {
      return false;
    }

    if (!search) {
      return true;
    }

    const text = [
      char["ID"],
      char["キャラ名"],
      char["レアリティ"],
      ...(char["本能"] || []).map(t => t["能力名"]),
      ...(char["本能"] || []).map(t => t["消費NP"]),
      ...(char["超本能"] || []).map(t => t["能力名"]),
      ...(char["超本能"] || []).map(t => t["消費NP"])
    ].join(" ");

    return text.includes(search);
  });

  document.getElementById("countText").textContent =
    `${filtered.length}件表示`;

  if (filtered.length === 0) {
    list.innerHTML = "<p class='empty'>該当するキャラがありません。</p>";
    return;
  }

  filtered.forEach(char => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="char-header">
        <img
          class="char-img"
          src="${escapeHtml(char["画像名"])}"
          alt="${escapeHtml(char["キャラ名"])}"
          onerror="this.src='image/noimage.png'"
        >

        <div class="char-info">
          <div class="name">${escapeHtml(char["キャラ名"])}</div>
          <div class="meta">
            ID: ${escapeHtml(char["ID"])} / ${escapeHtml(char["レアリティ"])}
          </div>
        </div>
      </div>

      <div class="talent-area">
        ${makeTalentHtml("本能", char["本能"])}
        ${char["超本能"] ? makeTalentHtml("超本能", char["超本能"], true) : ""}
      </div>
    `;

    list.appendChild(card);
  });
}

function makeTalentHtml(title, talents, isSuper = false) {
  if (!talents || talents.length === 0) {
    return "";
  }

  let html = `
    <div class="section-title">${title}</div>
    <div class="talent-row">
  `;

  talents.forEach(t => {
    html += `
      <div class="talent ${isSuper ? "super" : ""}">
        <div class="talent-name">${escapeHtml(t["能力名"])}</div>
        <div class="talent-np">NP:${escapeHtml(t["消費NP"])}</div>
      </div>
    `;
  });

  html += `</div>`;

  return html;
}

function escapeHtml(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
