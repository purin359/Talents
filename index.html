<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本能一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  font-size: 26px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

input,
select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.count {
  margin-bottom: 10px;
  color: #555;
}

.card {
  background: white;
  border-radius: 10px;

  padding: 12px 16px;
  margin-bottom: 12px;

  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.char-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.char-img {
  width: 72px;
  height: 72px;
  object-fit: contain;
  flex-shrink: 0;
}

.name {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 3px;
}

.meta {
  color: #666;
  font-size: 15px;
}

.talent-area {
  margin-top: 6px;
}

.section-title {
  font-weight: bold;
  margin: 5px 0;
  font-size: 15px;
}

.talent-row {
  display: flex;
  gap: 9px;

  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;

  padding: 2px 0 8px;
}

.talent {
  width: 132px;
  height: 64px;

  flex: 0 0 auto;

  background: #f1f1f1;
  border-radius: 9px;

  padding: 7px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  box-sizing: border-box;
}

.super {
  background: #fff0d6;
}

.talent-name {
  font-size: 13px;
  font-weight: bold;
  line-height: 1.15;
}

.talent-np {
  margin-top: 5px;
  font-size: 12px;
  color: #666;
}
  
.empty {
  color: #999;
}

@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    padding: 12px;
  }

  .char-img {
    width: 64px;
    height: 64px;
  }

  .name {
    font-size: 18px;
  }

  .talent {
    width: 135px;
    height: 68px;
  }

  .talent-name {
    font-size: 13px;
  }

  .talent-np {
    font-size: 12px;
  }
}

  #topButton {
  position: fixed;
  right: 18px;
  bottom: 18px;

  width: 52px;
  height: 52px;

  border: none;
  border-radius: 50%;

  background: #4CAF50;
  color: white;

  font-size: 24px;
  font-weight: bold;

  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);

  z-index: 9999;
}

#topButton:active {
  transform: scale(0.95);
}

  .hit-talent {
  border: 3px solid #ff3b30;
  box-sizing: border-box;
}

  .np-summary {
  background: #fff;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 10px;

  box-shadow: 0 1px 5px rgba(0,0,0,0.08);

  display: flex;
  gap: 20px;
}

.np-summary-left,
.np-summary-right {
  flex: 1;
}

.np-summary-right {
  border-left: 1px solid #ddd;
  padding-left: 20px;
}

.np-summary strong {
  font-size: 16px;
}

.np-summary-line {
  margin-top: 4px;
}

  .talent-check {
  width: 18px;
  height: 18px;
  cursor: pointer;
  flex-shrink: 0;
}

.talent-bottom {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;

  margin-top: 1px;
}

.talent-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;

  margin-top: 1px;
}

.talent-level {
  font-size: 11px;
  padding: 2px 3px;
  border-radius: 5px;
  border: 1px solid #aaa;
  background: white;
  max-width: 54px;
}

.talent-check {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

  .name-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.unlock-all-button {
  border: none;
  border-radius: 7px;

  background: #4CAF50;
  color: white;

  font-size: 12px;
  font-weight: bold;

  padding: 5px 10px;

  cursor: pointer;

  flex-shrink: 0;
}

.unlock-all-button:active {
  transform: scale(0.96);
}

  .unlock-complete {
  background: #999 !important;
  cursor: default;
  opacity: 0.8;
}
</style>
</head>

<body>

<h1>本能一覧</h1>

<div class="controls">
  <input type="text" id="charSearchInput" placeholder="キャラ名で検索">
  <input type="text" id="talentSearchInput" placeholder="本能・超本能で検索">  

  <select id="rarityFilter">
    <option value="">全レアリティ</option>
  </select>
</div>

<div id="npSummary" class="np-summary"></div>

<div class="count" id="countText"></div>

<div id="list"></div>

<script>
let characters = [];

fetch("talents.json")
  .then(res => res.json())
  .then(data => {
    characters = data;
    setupRarityFilter();
    renderList();
  })
  .catch(err => {
    document.getElementById("list").innerHTML =
      "<p class='empty'>talents.json を読み込めませんでした。</p>";
    console.error(err);
  });

document.getElementById("charSearchInput").addEventListener("input", renderList);
document.getElementById("talentSearchInput").addEventListener("input", renderList);
document.getElementById("rarityFilter").addEventListener("change", renderList);

function setupRarityFilter() {
  const select = document.getElementById("rarityFilter");

  const rarities = [...new Set(
    characters
      .map(c => c["レアリティ"])
      .filter(r => r !== "")
  )];

  rarities.forEach(rarity => {
    const option = document.createElement("option");
    option.value = rarity;
    option.textContent = rarity;
    select.appendChild(option);
  });
}

function renderList() {
  const list = document.getElementById("list");
  const charSearch = normalizeText(
  document.getElementById("charSearchInput").value
);

const talentSearch = normalizeText(
  document.getElementById("talentSearchInput").value
);

const rarity = document.getElementById("rarityFilter").value;

  list.innerHTML = "";

  const filtered = characters.filter(char => {

  if (rarity && char["レアリティ"] !== rarity) {
    return false;
  }

  // キャラ検索対象
  const charText = normalizeText([
    char["ID"],
    char["キャラ名"],
    char["レアリティ"]
  ].join(" "));

  // 本能検索対象
  const talentText = normalizeText([
    ...(char["本能"] || []).map(t => t["能力名"]),
    ...(char["本能"] || []).map(t => t["消費NP"]),
    ...(char["超本能"] || []).map(t => t["能力名"]),
    ...(char["超本能"] || []).map(t => t["消費NP"])
  ].join(" "));

  // キャラ検索欄に入力がある場合
  if (charSearch && !charText.includes(charSearch)) {
    return false;
  }

  // 本能検索欄に入力がある場合
  if (talentSearch && !talentText.includes(talentSearch)) {
    return false;
  }

  return true;
});

  updateNpSummary(filtered);

  document.getElementById("countText").textContent =
    `${filtered.length}件表示`;

  if (filtered.length === 0) {
    list.innerHTML = "<p class='empty'>該当するキャラがありません。</p>";
    return;
  }

  filtered.forEach(char => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="char-header">
        <img
          class="char-img"
          src="${escapeHtml(char["画像名"])}"
          alt="${escapeHtml(char["キャラ名"])}"
          onerror="this.src='image/noimage.png'"
        >

        <div class="char-info">
          <div class="name-row">

            <div class="name">
              ${escapeHtml(char["キャラ名"])}
            </div>

            <button
            class="unlock-all-button
              ${isCharacterFullyUnlocked(char) ? "unlock-complete" : ""}
            "
            onclick="unlockAllTalents('${escapeAttr(char["ID"])}')"
            ${isCharacterFullyUnlocked(char) ? "disabled" : ""}
          >
            全開放
          </button>

          </div>
          <div class="meta">
            ${(() => {

            const totalNp = getCharacterTotalNp(char);
            const nonResistanceNp = getCharacterNonResistanceNp(char);

            // 同じなら耐性なしを省略
            if (totalNp === nonResistanceNp) {
              return `
                合計NP：
                ${totalNp.toLocaleString()} NP
              `;
            }

            return `
              合計NP：
              ${totalNp.toLocaleString()} NP
              /
              耐性なし：
              ${nonResistanceNp.toLocaleString()} NP
            `;

          })()}
          </div>
        </div>
      </div>

      <div class="talent-area">
        ${makeTalentHtml("本能", char["本能"], false, talentSearch, char)}
        ${char["超本能"] ? makeTalentHtml("超本能", char["超本能"], true, talentSearch, char) : ""}      
      </div>
    `;

    list.appendChild(card);
  });
}

  function sumNpText(npText) {
  return String(npText ?? "")
    .split(",")
    .map(v => Number(v.trim()))
    .filter(v => !isNaN(v))
    .reduce((sum, v) => sum + v, 0);
}

  function parseNpArray(npText) {
  return String(npText ?? "")
    .split(",")
    .map(v => Number(v.trim()))
    .filter(v => !isNaN(v));
}

// レアリティ別・合計NP別のレベル消費NP表
function getLevelNpList(rarity, totalNp) {
  const table = {
    "EX": {
      125: [10,10,10,10,10,15,15,15,15,15],
      165: [50,10,10,10,10,15,15,15,15,15],
      175: [15,15,15,15,15,20,20,20,20,20],
      215: [75,10,10,10,10,20,20,20,20,20],
      235: [75,15,15,15,15,20,20,20,20,20]
    },
    "レア": {
      25: [5,5,5,5,5],
      75: [5,5,5,5,5,10,10,10,10,10],
      95: [25,5,5,5,5,10,10,10,10,10]
    },
    "激レア": {
      125: [10,10,10,10,10,15,15,15,15,15],
      165: [50,10,10,10,10,15,15,15,15,15]
    },
    "超激レア": {
      175: [15,15,15,15,15,20,20,20,20,20],
      225: [20,20,20,20,20,25,25,25,25,25],
      235: [75,15,15,15,15,20,20,20,20,20],
      285: [100,15,15,15,15,25,25,25,25,25],
      355: [150,20,20,20,20,25,25,25,25,25]
    }
  };

  return table[rarity]?.[totalNp] || null;
}

function getTalentTotalNp(talent) {
  return sumNpText(talent["消費NP"]);
}

function getTalentMaxLevel(char, talent) {
  const totalNp = getTalentTotalNp(talent);
  const levelList = getLevelNpList(char["レアリティ"], totalNp);

  return levelList ? levelList.length : 0;
}

function getUsedNpByLevel(char, talent, level) {
  const totalNp = getTalentTotalNp(talent);
  const levelList = getLevelNpList(char["レアリティ"], totalNp);

  // レベルなし本能
  if (!levelList) {
    return level > 0 ? totalNp : 0;
  }

  return levelList
    .slice(0, level)
    .reduce((sum, v) => sum + v, 0);
}

  function getCharacterTotalNp(char) {
  const talents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return talents.reduce((sum, t) => {
    return sum + sumNpText(t["消費NP"]);
  }, 0);
}

  function getCharacterNonResistanceNp(char) {

  const talents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return talents.reduce((sum, t) => {

    if (isResistanceTalent(t["能力名"])) {
      return sum;
    }

    return sum + sumNpText(t["消費NP"]);

  }, 0);
}

  function getUnlockedNpTotal(targetCharacters) {
  const unlocked = loadUnlockedTalents();

  let total = 0;

  targetCharacters.forEach(char => {
    ["本能", "超本能"].forEach(title => {
      const talents = char[title] || [];

      talents.forEach((t, index) => {
        const key = makeTalentKey(char, title, index);
        const level = Number(unlocked[key] || 0);

        total += getUsedNpByLevel(char, t, level);
      });
    });
  });

  return total;
}

function isResistanceTalent(name) {
  const text = normalizeText(name);

  // ○○耐性を除外
  // 例：赤い敵耐性、浮いてる敵耐性、エイリアン耐性 など
  return text.includes("耐性");
}

function updateNpSummary(targetCharacters) {

  const rarity = document.getElementById("rarityFilter").value;
  const summary = document.getElementById("npSummary");

  let totalNp = 0;
  let totalNpWithoutResistance = 0;

  targetCharacters.forEach(char => {

    const talents = [
      ...(char["本能"] || []),
      ...(char["超本能"] || [])
    ];

    talents.forEach(t => {

      const np = sumNpText(t["消費NP"]);
      const name = t["能力名"];

      totalNp += np;

      if (!isResistanceTalent(name)) {
        totalNpWithoutResistance += np;
      }

    });

  });

  const unlockedNp = getUnlockedNpTotal(targetCharacters);

  const rarityText = rarity ? rarity : "全レアリティ";

  summary.innerHTML = `
    <div class="np-summary-left">

      <strong>${escapeHtml(rarityText)}</strong>

      <div class="np-summary-line">
        全ての本能NP合計：
        ${totalNp.toLocaleString()} NP
      </div>

      <div class="np-summary-line">
        耐性以外：
        ${totalNpWithoutResistance.toLocaleString()} NP
      </div>

    </div>

    <div class="np-summary-right">

      <strong>開放済み</strong>

      <div class="np-summary-line">
        開放済みNP合計：
        ${unlockedNp.toLocaleString()} NP
      </div>

    </div>
  `;
}

function makeTalentHtml(title, talents, isSuper = false, talentSearch = "", char = null) {
  if (!talents || talents.length === 0) {
    return "";
  }

  const unlocked = loadUnlockedTalents();

  let html = `
    <div class="section-title">${title}</div>
    <div class="talent-row">
  `;

  talents.forEach((t, index) => {
    const talentName = normalizeText(t["能力名"]);
    const npText = normalizeText(t["消費NP"]);

    const isHit =
      talentSearch &&
      (
        talentName.includes(talentSearch) ||
        npText.includes(talentSearch)
      );

    const key = char ? makeTalentKey(char, title, index) : "";
    const savedLevel = Number(unlocked[key] || 0);

    const maxLevel = char ? getTalentMaxLevel(char, t) : 0;
    const totalNp = getTalentTotalNp(t);
    const usedNp = char ? getUsedNpByLevel(char, t, savedLevel) : 0;

    let controlHtml = "";

    if (maxLevel > 0) {
  controlHtml = `
    <select
      class="talent-level"
      onchange="setTalentLevel('${escapeAttr(key)}', this.value)"
    >
      ${makeLevelOptions(maxLevel, savedLevel)}
    </select>

    <input
      type="checkbox"
      class="talent-check"
      ${savedLevel === maxLevel ? "checked" : ""}
      onchange="setTalentLevel('${escapeAttr(key)}', this.checked ? ${maxLevel} : 0)"
      title="MAX"
    >
  `;
} else {
      controlHtml = `
        <input
          type="checkbox"
          class="talent-check"
          ${savedLevel > 0 ? "checked" : ""}
          onchange="setTalentLevel('${escapeAttr(key)}', this.checked ? 1 : 0)"
        >
      `;
    }

    html += `
      <div class="talent ${isSuper ? "super" : ""} ${isHit ? "hit-talent" : ""}">
        <div class="talent-name">
          ${escapeHtml(t["能力名"])}
        </div>

        <div class="talent-bottom">
          <div class="talent-np">
            ${usedNp > 0 ? `${usedNp}/${totalNp}NP` : `NP:${totalNp}`}
          </div>
        </div>

        <div class="talent-controls">
          ${controlHtml}
        </div>
      </div>
    `;
  });

  html += `</div>`;

  return html;
}

function makeLevelOptions(maxLevel, savedLevel) {
  let html = `<option value="0">未</option>`;

  for (let i = 1; i <= maxLevel; i++) {
    html += `
      <option value="${i}" ${i === savedLevel ? "selected" : ""}>
        Lv${i}
      </option>
    `;
  }

  return html;
}
  
  function normalizeText(text) {
  return String(text ?? "")
    .normalize("NFKC")
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[‐-‒–—―ー]/g, "-");
}

function escapeHtml(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

  function escapeAttr(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

  function scrollToTop() {
  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

  // 保存
  const TALENT_SAVE_KEY = "nyanko_talent_unlocked";

function loadUnlockedTalents() {
  try {
    return JSON.parse(localStorage.getItem(TALENT_SAVE_KEY)) || {};
  } catch {
    return {};
  }
}

function saveUnlockedTalents(data) {
  localStorage.setItem(TALENT_SAVE_KEY, JSON.stringify(data));
}

function makeTalentKey(char, title, index) {
  return `${char["ID"]}_${char["キャラ名"]}_${title}_${index}`;
}

function setTalentLevel(key, level) {
  const data = loadUnlockedTalents();

  level = Number(level);

  if (level > 0) {
    data[key] = level;
  } else {
    delete data[key];
  }

  saveUnlockedTalents(data);
  renderList();
}

  function unlockAllTalents(characterId) {

  const data = loadUnlockedTalents();

  const char = characters.find(c => String(c["ID"]) === String(characterId));

  if (!char) {
    return;
  }

  ["本能", "超本能"].forEach(title => {

    const talents = char[title] || [];

    talents.forEach((talent, index) => {

      const key = makeTalentKey(char, title, index);

      const maxLevel = getTalentMaxLevel(char, talent);

      // レベルあり → MAX
      if (maxLevel > 0) {
        data[key] = maxLevel;
      }
      // レベルなし → ON
      else {
        data[key] = 1;
      }

    });

  });

  saveUnlockedTalents(data);

  renderList();
}

  function isCharacterFullyUnlocked(char) {

  const unlocked = loadUnlockedTalents();

  const allTalents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return allTalents.every((talent, index) => {

    const title =
      index < (char["本能"] || []).length
        ? "本能"
        : "超本能";

    const talentIndex =
      title === "本能"
        ? index
        : index - (char["本能"] || []).length;

    const key = makeTalentKey(char, title, talentIndex);

    const savedLevel = Number(unlocked[key] || 0);

    const maxLevel = getTalentMaxLevel(char, talent);

    // レベルあり
    if (maxLevel > 0) {
      return savedLevel >= maxLevel;
    }

    // レベルなし
    return savedLevel > 0;
  });
}
</script>

<button id="topButton" onclick="scrollToTop()">↑</button>
</body>
</html>
