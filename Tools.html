<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本能ランキングツール</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  font-size: 26px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.section {
  background: white;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 18px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

h2 {
  font-size: 20px;
  margin-top: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  border-bottom: 1px solid #ddd;
  padding: 8px;
  text-align: left;
}

th {
  background: #f0f0f0;
}

.rank {
  width: 50px;
  text-align: center;
}

.np {
  text-align: right;
  white-space: nowrap;
}

.empty {
  color: #999;
}

  .ranking-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.ranking-tab {
  border: none;
  border-radius: 8px;

  padding: 10px 14px;

  background: #666;
  color: white;

  font-size: 15px;
  cursor: pointer;
}

.ranking-tab.active {
  background: #2196F3;
}

  .ranking-icon {
  width: 42px;
  height: 42px;
  object-fit: contain;
  display: block;
}

  .detail-toggle {
  margin-left: 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 16px;
}

.ability-char-images {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 10px;
  background: #fafafa;
}

.ability-char-icon {
  width: 42px;
  height: 42px;
  object-fit: contain;
}

  .ability-row {
  cursor: pointer;
}

.ability-row:hover {
  background: #f7f7f7;
}

  .ability-char-super {
  background: #ffe0b2;
  border-radius: 8px;
  padding: 2px;
}
</style>
</head>

<body>

<h1>本能ランキングツール</h1>

<div class="controls">
  <select id="rarityFilter">
    <option value="">全レアリティ</option>
  </select>
  
  <button
    id="mergeAbilityButton"
    class="ranking-tab active"
    onclick="toggleMergeAbilityNames()"
    style="display:none;"
  >
    強化・属性まとめON
  </button>
</div>

<div class="section">

  <div class="ranking-tabs">

    <button
      id="npTabButton"
      class="ranking-tab active"
      onclick="switchRanking('np')"
    >
      合計NPランキング
    </button>

    <button
      id="abilityTabButton"
      class="ranking-tab"
      onclick="switchRanking('ability')"
    >
      能力ランキング
    </button>

  </div>

  <h2 id="rankingTitle">
    合計NPランキング
  </h2>

  <div id="rankingContent"></div>

</div>

<script>
let characters = [];
let currentRankingType = "np";
let mergeAbilityNames = true;

fetch("talents.json")
  .then(res => res.json())
  .then(data => {
    characters = data;
    setupRarityFilter();
    renderRankings();
  })
  .catch(err => {
    document.body.innerHTML += "<p class='empty'>talents.json を読み込めませんでした。</p>";
    console.error(err);
  });

document.getElementById("rarityFilter").addEventListener("change", renderRankings);

function setupRarityFilter() {
  const select = document.getElementById("rarityFilter");

  const rarities = [...new Set(
    characters
      .map(c => c["レアリティ"])
      .filter(r => r)
  )];

  rarities.forEach(rarity => {
    const option = document.createElement("option");
    option.value = rarity;
    option.textContent = rarity;
    select.appendChild(option);
  });
}

function renderRankings() {

  const rarity =
    document.getElementById("rarityFilter").value;

  const filtered = characters.filter(char => {

    if (rarity && char["レアリティ"] !== rarity) {
      return false;
    }

    return true;
  });

  if (currentRankingType === "np") {
    renderNpRanking(filtered);
  } else {
    renderAbilityRanking(filtered);
  }
}

  function switchRanking(type) {

  currentRankingType = type;

  document.getElementById("npTabButton")
    .classList.toggle(
      "active",
      type === "np"
    );

  document.getElementById("abilityTabButton")
    .classList.toggle(
      "active",
      type === "ability"
    );

  document.getElementById("rankingTitle")
    .textContent =
      type === "np"
        ? "合計NPランキング"
        : "最も多い本能の能力ランキング";

    const mergeButton =
      document.getElementById("mergeAbilityButton");

    mergeButton.style.display =
      type === "ability"
        ? ""
        : "none";

  renderRankings();
}

function getAllTalents(char) {
  return [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];
}

function sumNpText(npText) {
  return String(npText ?? "")
    .split(",")
    .map(v => Number(v.trim()))
    .filter(v => !isNaN(v))
    .reduce((sum, v) => sum + v, 0);
}

function getCharacterTotalNp(char) {
  return getAllTalents(char).reduce((sum, talent) => {
    return sum + sumNpText(talent["消費NP"]);
  }, 0);
}

function renderNpRanking(list) {
  const ranking = list
    .map(char => ({
      id: char["ID"],
      name: char["キャラ名"],
      rarity: char["レアリティ"],
      image: char["画像名"],
      totalNp: getCharacterTotalNp(char)
    }))
    .sort((a, b) => b.totalNp - a.totalNp);

  let html = `
    <table>
      <tr>
        <th class="rank">順位</th>
        <th>画像</th>
        <th>キャラ名</th>
        <th>レアリティ</th>
        <th class="np">合計NP</th>
      </tr>
  `;

  let currentRank = 0;
  let prevNp = null;

  ranking.forEach((item, index) => {

    if (item.totalNp !== prevNp) {
      currentRank = index + 1;
      prevNp = item.totalNp;
    }
    html += `
      <tr>
        <td class="rank">${currentRank}</td>

        <td>
          <img
            class="ranking-icon"
            src="${escapeHtml(item.image)}"
            alt="${escapeHtml(item.name)}"
            onerror="this.src='image/noimage.png'"
          >
        </td>

        <td>${escapeHtml(item.name)}</td>

        <td>${escapeHtml(item.rarity)}</td>

        <td class="np">
          ${item.totalNp.toLocaleString()} NP
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("rankingContent").innerHTML = html;
}

  function normalizeAbilityNameForRanking(name) {
  const text = String(name ?? "");

  if (!mergeAbilityNames) {
    return text.trim();
  }

  return text
    .replace(/【[^】]*】/g, "")
    .replace(/強化/g, "")
    .trim();
}

  function toggleMergeAbilityNames() {
  mergeAbilityNames = !mergeAbilityNames;

  const button = document.getElementById("mergeAbilityButton");

  button.textContent = mergeAbilityNames
    ? "強化・属性まとめON"
    : "強化・属性まとめOFF";

  button.classList.toggle("active", mergeAbilityNames);

  renderRankings();
}

function renderAbilityRanking(list) {
  const countMap = {};

  list.forEach(char => {
    getAllTalents(char).forEach(talent => {
      const name = normalizeAbilityNameForRanking(talent["能力名"]);
      if (!name) return;

      if (!countMap[name]) {
        countMap[name] = {
          name,
          count: 0,
          chars: []
        };
      }

      countMap[name].count++;
      countMap[name].chars.push(char);
    });
  });

  const ranking = Object.values(countMap)
    .sort((a, b) => b.count - a.count);

  let html = `
    <table>
      <tr>
        <th class="rank">順位</th>
        <th>能力名</th>
        <th class="np">数</th>
      </tr>
  `;

  let currentRank = 0;
  let prevCount = null;

  ranking.forEach((item, index) => {
    if (item.count !== prevCount) {
      currentRank = index + 1;
      prevCount = item.count;
    }

    const detailId = `abilityDetail_${index}`;

    html += `
      <tr
        class="ability-row"
        onclick="toggleAbilityDetail('${detailId}', this)"
      >
        <td class="rank">${currentRank}</td>

        <td>
          ${escapeHtml(item.name)}

          <span class="detail-toggle">
            ▼
          </span>
        </td>

        <td class="np">
          ${item.count.toLocaleString()}個
        </td>
      </tr>

      <tr id="${detailId}" style="display:none;">
        <td colspan="3">
          <div class="ability-char-images">
            ${item.chars.map(char => `
              <img
                class="
                  ability-char-icon
                  ${
                    (char["超本能"] || []).some(t =>
                      normalizeAbilityNameForRanking(t["能力名"]) === item.name
                    )
                      ? "ability-char-super"
                      : ""
                  }
                "
                src="${escapeHtml(char["画像名"])}"
                alt="${escapeHtml(char["キャラ名"])}"
                title="${escapeHtml(char["キャラ名"])}"
                onerror="this.src='image/noimage.png'"
              >
            `).join("")}
          </div>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("rankingContent").innerHTML = html;
}

  function toggleAbilityDetail(id, rowElement) {

  const row = document.getElementById(id);
  if (!row) return;

  const isOpen =
    row.style.display === "table-row";

  row.style.display =
    isOpen
      ? "none"
      : "table-row";

  const triangle =
    rowElement.querySelector(".detail-toggle");

  if (triangle) {
    triangle.textContent =
      isOpen
        ? "▼"
        : "▲";
  }
}

function escapeHtml(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}
</script>

</body>
</html>
