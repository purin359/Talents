<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>本能一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  font-size: 26px;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

input,
select {
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.count {
  margin-bottom: 10px;
  color: #555;
}

.card {
  background: white;
  border-radius: 10px;

  padding: 12px 16px;
  margin-bottom: 12px;

  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.char-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.char-img {
  width: 72px;
  height: 72px;
  object-fit: contain;
  flex-shrink: 0;
}

.name {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 3px;
}

.meta {
  color: #666;
  font-size: 15px;
}

.talent-area {
  margin-top: 6px;
}

.section-title {
  font-weight: bold;
  margin: 5px 0;
  font-size: 15px;
}

.talent-row {
  display: flex;
  gap: 9px;

  flex-wrap: nowrap;
  overflow-x: auto;
  overflow-y: hidden;

  padding: 2px 0 8px;
}

.talent {
  width: 132px;
  height: 64px;

  flex: 0 0 auto;

  background: #f1f1f1;
  border-radius: 9px;

  padding: 7px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
  box-sizing: border-box;
}

.super {
  background: #fff0d6;
}

.talent-name {
  font-size: 13px;
  font-weight: bold;
  line-height: 1.15;
}

.talent-np {
  margin-top: 5px;
  font-size: 12px;
  color: #666;
}
  
.empty {
  color: #999;
}

@media (max-width: 600px) {
  body {
    padding: 10px;
  }

  h1 {
    font-size: 22px;
  }

  .card {
    padding: 12px;
  }

  .char-img {
    width: 64px;
    height: 64px;
  }

  .name {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 3px;

  flex: 0 1 auto;
  min-width: 0;

  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

  .talent {
    width: 135px;
    height: 68px;
  }

  .talent-name {
    font-size: 13px;
  }

  .talent-np {
    font-size: 12px;
  }
}

  #topButton {
  position: fixed;
  right: 18px;
  bottom: 18px;

  width: 52px;
  height: 52px;

  border: none;
  border-radius: 50%;

  background: #4CAF50;
  color: white;

  font-size: 24px;
  font-weight: bold;

  cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.25);

  z-index: 9999;
}

#topButton:active {
  transform: scale(0.95);
}

  .hit-talent {
  border: 3px solid #ff3b30;
  box-sizing: border-box;
}

  .np-summary {
  background: #fff;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 10px;

  box-shadow: 0 1px 5px rgba(0,0,0,0.08);

  display: flex;
  gap: 20px;
}

.np-summary-column {
  flex: 1;
}

.np-summary-column + .np-summary-column {
  border-left: 1px solid #ddd;
  padding-left: 20px;
}

.np-summary strong {
  font-size: 16px;
}

.np-summary-line {
  margin-top: 4px;
}

  .talent-check {
  width: 18px;
  height: 18px;
  cursor: pointer;
  flex-shrink: 0;
}

.talent-bottom {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;

  margin-top: 1px;
}

.talent-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;

  margin-top: 1px;
}

.talent-level {
  font-size: 11px;
  padding: 2px 5px;
  border-radius: 5px;
  border: 1px solid #aaa;
  background: white;

  width: 72px;
}

.talent-check {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

  .name-row {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;

  width: fit-content;
  max-width: 100%;
}

.unlock-all-button {
  border: none;
  border-radius: 7px;

  background: #4CAF50;
  color: white;

  font-size: 12px;
  font-weight: bold;

  padding: 5px 10px;

  cursor: pointer;

  flex-shrink: 0;

  margin-left: 0;
}
  
.unlock-all-button:active {
  transform: scale(0.96);
}

  .unlock-complete {
  background: #999 !important;
  cursor: default;
  opacity: 0.8;
}

  .unlock-buttons {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.unlock-nonresist-button {
  border: none;
  border-radius: 7px;

  background: #ff9800;
  color: white;

  font-size: 12px;
  font-weight: bold;

  padding: 5px 10px;

  cursor: pointer;
}

.unlock-nonresist-button:active {
  transform: scale(0.96);
}

  .reset-talents-button {
  border: none;
  border-radius: 7px;

  background: #e53935;
  color: white;

  font-size: 12px;
  font-weight: bold;

  padding: 5px 10px;

  cursor: pointer;
}

.reset-talents-button:active {
  transform: scale(0.96);
}

  .talent-partial {
  background: #dff5d8 !important;
}

.talent-max {
  background: #d9f0ff !important;
}

/* 超本能用 */
.super.talent-partial {
  background: #d8f5c8 !important;
}

.super.talent-max {
  background: #cfeeff !important;
}

  #shortNameButton {
  font-size: 16px;
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  background: #666;
  color: white;
  cursor: pointer;
}

#shortNameButton.short-on {
  background: #2196F3;
}

  #starFilterButton {
  font-size: 16px;
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  background: #666;
  color: white;
  cursor: pointer;
}

#starFilterButton.star-filter-on {
  background: #f9a825;
}

.card {
  position: relative;
}

.star-button {
  position: absolute;
  top: 8px;
  right: 10px;

  border: none;
  background: transparent;

  font-size: 24px;
  line-height: 1;

  cursor: pointer;
  color: #bbb;

  z-index: 2;
}

.star-button.star-on {
  color: #f9a825;
}

  .remaining-meta {
  margin-top: 2px;
  color: #777;
  font-size: 14px;
}

  .account-area {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;

  margin-bottom: 0;

  padding: 10px 12px;

  background: #f5f5f5;
  border: 1px solid #ddd;
  border-radius: 14px;

  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.account-area button {
  font-size: 14px;
  padding: 8px 10px;
  border: none;
  border-radius: 8px;
  background: #555;
  color: white;
  cursor: pointer;
}

  .top-header {
  display: flex;
  justify-content: space-between;
  align-items: center;

  gap: 12px;
  flex-wrap: wrap;

  margin-bottom: 12px;
}

.top-header h1 {
  margin: 0;
}

.account-area {
  margin-bottom: 0;
}

  .search-input {
  width: 170px;
}

  #superTalentButton {
  font-size: 16px;
  padding: 10px 12px;
  border: none;
  border-radius: 8px;
  background: #666;
  color: white;
  cursor: pointer;
}

#superTalentButton.super-filter-on {
  background: #ff9800;
}

  .tools-link-button {
  display: flex;
  align-items: center;
  justify-content: center;

  margin-left: 10px;

  padding: 6px 10px;

  font-size: 14px;
  font-weight: bold;

  color: #555;
  text-decoration: none;

  background: white;

  border: 1px solid #ccc;
  border-radius: 8px;

  transition: 0.15s;
}

.tools-link-button:hover {
  background: #f5f5f5;
  border-color: #999;
}

  .talent-star-button {
  border: none;
  background: transparent;
  color: #bbb;
  font-size: 16px;
  cursor: pointer;
  padding: 0 2px;
}

.talent-star-button.talent-star-on {
  color: #f9a825;
}

  .status-filter-area {
  margin-bottom: 12px;
}

#statusFilter {
  font-size: 15px;
  padding: 8px 10px;
}

  #fullIncludeResistanceButton {
  margin-left: 8px;

  font-size: 14px;
  padding: 8px 10px;

  border: none;
  border-radius: 8px;

  background: #666;
  color: white;

  cursor: pointer;
}

#fullIncludeResistanceButton.active {
  background: #2196F3;
}

  .new-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  margin-left: 6px;

  padding: 3px 8px;

  border-radius: 8px;

  background: #ff3b30;
  color: white;

  font-size: 13px;
  font-weight: bold;

  line-height: 1;
}

  #newFilterButton {
  font-size: 16px;
  padding: 10px 12px;

  border: none;
  border-radius: 8px;

  background: #666;
  color: white;

  cursor: pointer;

  transition: 0.15s;
}

#newFilterButton.new-filter-on {
  background: #ff3b30;
}

  .version-info {
  position: absolute;
  top: 8px;
  right: 42px;

  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;

  font-size: 13px;
  line-height: 1.2;
  font-weight: bold;

  z-index: 2;
}

.version-badge {
  padding: 4px 9px;
  border-radius: 8px;

  background: #6495ED;
  color: white;

  box-shadow: 0 2px 5px rgba(0,0,0,0.18);

  white-space: nowrap;
}

.version-badge.super-ver {
  background: #FFF450;
}
  
  #versionSortButton {
  font-size: 16px;
  padding: 10px 12px;

  border: none;
  border-radius: 8px;

  background: #666;
  color: white;

  cursor: pointer;

  transition: 0.15s;
}

#versionSortButton.version-sort-on {
  background: #FBB161;
}
</style>
</head>

<body>

<div class="top-header">

  <h1>本能一覧　Ver.15.4.0対応</h1>

  <div class="account-area">
    <select id="accountSelect" onchange="changeAccount()"></select>

    <button onclick="addAccount()">
      アカウント追加
    </button>

    <button onclick="renameAccount()">
      名前変更
    </button>
  </div>

</div>
  
<div class="controls">
  <input type="text" id="charSearchInput" class="search-input" placeholder="キャラ名で検索">
  <input type="text" id="talentSearchInput" class="search-input" placeholder="本能・超本能で検索">
  
  <button id="superTalentButton" onclick="toggleSuperTalentFilter()">
    超本能のみ
  </button>
  
  <button id="starFilterButton" onclick="toggleStarFilter()">
    ☆表示
  </button>

  <select id="rarityFilter">
    <option value="">全レアリティ</option>
  </select>

  <button
  id="shortNameButton"
  class="short-on"
  onclick="toggleShortTalentName()"
>
  略称ON
</button>

  <a class="tools-link-button" href="Tools.html">
    その他
  </a>
</div>

<div class="status-filter-area">
  <select id="statusFilter" onchange="renderList()">
    <option value="all">全て</option>
    <option value="opened">開放済みのみ</option>
    <option value="full">全開放のみ</option>
    <option value="none">未開放のみ</option>
  </select>

<button
  id="fullIncludeResistanceButton"
  onclick="toggleFullIncludeResistance()"
  style="display:none;"
>
  耐性以外を含む
</button>

<button id="newFilterButton" onclick="toggleNewFilter()">
  NEWのみ
</button>

  <button
    id="versionSortButton"
    onclick="toggleVersionSort()"
  >
    Verソート
  </button>
</div>

<div id="npSummary" class="np-summary"></div>

<div class="count" id="countText"></div>

<div id="list"></div>

<script>
let characters = [];
let filteredCharacters = [];
let useShortTalentName = true;
let starFilterOnly = false;
let superTalentOnly = false;
let fullExcludeResistance = false;
let newFilterOnly = false;
let versionSortMode = false;

fetch("talents.json")
  .then(res => res.json())
  .then(data => {
  characters = data;
  setupRarityFilter();

  renderList();
})
  .catch(err => {
    document.getElementById("list").innerHTML =
      "<p class='empty'>talents.json を読み込めませんでした。</p>";
    console.error(err);
  });

document.getElementById("charSearchInput").addEventListener("input", renderList);
document.getElementById("talentSearchInput").addEventListener("input", renderList);
document.getElementById("rarityFilter").addEventListener("change", renderList);

function setupRarityFilter() {
  const select = document.getElementById("rarityFilter");

  const rarities = [...new Set(
    characters
      .map(c => c["レアリティ"])
      .filter(r => r !== "")
  )];

  rarities.forEach(rarity => {
    const option = document.createElement("option");
    option.value = rarity;
    option.textContent = rarity;
    select.appendChild(option);
  });
}

  function getRarityFilteredCharacters() {

  const rarity =
    document.getElementById("rarityFilter").value;

  return characters.filter(char => {

    if (rarity && char["レアリティ"] !== rarity) {
      return false;
    }

    return true;
  });
}

function renderList() {
  const list = document.getElementById("list");
  const charSearch = normalizeText(
  document.getElementById("charSearchInput").value
);

const talentSearch = normalizeText(
  document.getElementById("talentSearchInput").value
);

const rarity = document.getElementById("rarityFilter").value;
const statusFilter = document.getElementById("statusFilter").value;

  list.innerHTML = "";

  filteredCharacters = characters.filter(char => {

  // 超本能のみ
  if (
    superTalentOnly &&
    (!char["超本能"] || char["超本能"].length === 0)
  ) {
    return false;
  }

  if (starFilterOnly && !isCharacterStarred(char)) {
    return false;
  }

  if (
    newFilterOnly &&
    !isNewCharacter(char)
  ) {
    return false;
  }

  if (rarity && char["レアリティ"] !== rarity) {
    return false;
  }

  const unlockStatus = getCharacterUnlockStatus(char);

  if (statusFilter === "opened" && !unlockStatus.isOpened) {
    return false;
  }

  if (statusFilter === "full") {

    if (fullExcludeResistance) {

      if (!isCharacterFullWithoutResistance(char)) {
        return false;
      }

    } else {

      if (!unlockStatus.isFull) {
        return false;
      }

    }
  }

  if (statusFilter === "none" && !unlockStatus.isNone) {
    return false;
  }

  // キャラ検索対象
  const charText = normalizeText([
    char["ID"],
    char["キャラ名"],
    char["レアリティ"]
  ].join(" "));

  // 本能検索対象
  const talentText = normalizeText([
  ...(char["本能"] || []).map(t => t["能力名"]),
  ...(char["本能"] || []).map(t => getShortTalentName(t["能力名"])),
  ...(char["本能"] || []).map(t => t["消費NP"]),

  ...(char["超本能"] || []).map(t => t["能力名"]),
  ...(char["超本能"] || []).map(t => getShortTalentName(t["能力名"])),
  ...(char["超本能"] || []).map(t => t["消費NP"])
].join(" "));

  // キャラ検索欄に入力がある場合
  if (charSearch && !charText.includes(charSearch)) {
    return false;
  }

  // 本能検索欄に入力がある場合
  if (talentSearch && !talentText.includes(talentSearch)) {
    return false;
  }

  return true;
});

  if (versionSortMode) {

    filteredCharacters.sort((a, b) => {

      const verA =
        a["本能追加Ver"] || "0";

      const verB =
        b["本能追加Ver"] || "0";

      return compareVersion(verA, verB);
    });
  }

  updateNpSummary(getRarityFilteredCharacters());

  document.getElementById("countText").textContent =
    `${filteredCharacters.length}件表示`;

  if (filteredCharacters.length === 0) {
    list.innerHTML = "<p class='empty'>該当するキャラがありません。</p>";
    return;
  }

  filteredCharacters.forEach(char => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
    <div class="version-info">

      ${
        char["本能追加Ver"]
          ? `
            <div class="version-badge">
              本能追加Ver:${escapeHtml(char["本能追加Ver"])}
            </div>
          `
          : ""
      }

      ${
        char["超本能追加Ver"]
          ? `
            <div class="version-badge super-ver">
              超本能追加Ver:${escapeHtml(char["超本能追加Ver"])}
            </div>
          `
          : ""
      }

    </div>
    <button
      class="star-button ${isCharacterStarred(char) ? "star-on" : ""}"
      data-character-id="${escapeAttr(char["ID"])}"
      onclick="toggleCharacterStar('${escapeAttr(char["ID"])}')"
      title="候補にする"
    >
      ${isCharacterStarred(char) ? "★" : "☆"}
    </button>
      <div class="char-header">
        <img
          class="char-img"
          src="${escapeHtml(char["画像名"])}"
          alt="${escapeHtml(char["キャラ名"])}"
          onerror="this.src='image/noimage.png'"
        >

        <div class="char-info">
          <div class="name-row">

            <div class="name">
              ${escapeHtml(char["キャラ名"])}

              ${
                isNewCharacter(char)
                  ? `<span class="new-badge">NEW</span>`
                  : ""
              }
            </div>

            <div class="unlock-buttons">

            <button
              class="unlock-all-button
              ${isCharacterFullyUnlocked(char) ? "unlock-complete" : ""}
            "
            data-character-id="${escapeAttr(char["ID"])}"
            onclick="unlockAllTalents('${escapeAttr(char["ID"])}')"
            ${isCharacterFullyUnlocked(char) ? "disabled" : ""}
          >
            全開放
          </button>

          <button
            class="unlock-nonresist-button
              ${isCharacterNonResistanceUnlocked(char)
                ? "unlock-complete"
                : ""}
            "
            data-nonresist-character-id="${escapeAttr(char["ID"])}"
            onclick="unlockNonResistanceTalents('${escapeAttr(char["ID"])}')"
            ${isCharacterNonResistanceUnlocked(char)
              ? "disabled"
              : ""}
            >
            耐性以外
          </button>

          <button
            class="reset-talents-button"
            onclick="resetCharacterTalents('${escapeAttr(char["ID"])}')"
          >
            リセット
          </button>

        </div>

          </div>
          <div class="meta">
            ${(() => {

            const totalNp = getCharacterTotalNp(char);
            const nonResistanceNp = getCharacterNonResistanceNp(char);

            // 同じなら耐性なしを省略
            if (totalNp === nonResistanceNp) {
              return `
                合計NP：
                ${totalNp.toLocaleString()} NP
              `;
            }

            return `
              合計NP：
              ${totalNp.toLocaleString()} NP
              /
              耐性なし：
              ${nonResistanceNp.toLocaleString()} NP
            `;

          })()}
          </div>
          <div
            class="meta remaining-meta"
            data-remaining-character-id="${escapeAttr(char["ID"])}"
          >
            ${makeRemainingMetaHtml(char)}
          </div>
        </div>
      </div>

      <div class="talent-area">
        ${makeTalentHtml("本能", char["本能"], false, talentSearch, char)}
        ${char["超本能"] ? makeTalentHtml("超本能", char["超本能"], true, talentSearch, char) : ""}      
      </div>
    `;

    list.appendChild(card);
  });
}

  function sumNpText(npText) {
  return String(npText ?? "")
    .split(",")
    .map(v => Number(v.trim()))
    .filter(v => !isNaN(v))
    .reduce((sum, v) => sum + v, 0);
}

  function parseNpArray(npText) {
  return String(npText ?? "")
    .split(",")
    .map(v => Number(v.trim()))
    .filter(v => !isNaN(v));
}

// レアリティ別・合計NP別のレベル消費NP表
function getLevelNpList(rarity, totalNp) {
  const table = {
    "EX": {
      125: [10,10,10,10,10,15,15,15,15,15],
      165: [50,10,10,10,10,15,15,15,15,15],
      175: [15,15,15,15,15,20,20,20,20,20],
      215: [75,10,10,10,10,20,20,20,20,20],
      235: [75,15,15,15,15,20,20,20,20,20]
    },
    "レア": {
      25: [5,5,5,5,5],
      75: [5,5,5,5,5,10,10,10,10,10],
      95: [25,5,5,5,5,10,10,10,10,10]
    },
    "激レア": {
      125: [10,10,10,10,10,15,15,15,15,15],
      165: [50,10,10,10,10,15,15,15,15,15]
    },
    "超激レア": {
      175: [15,15,15,15,15,20,20,20,20,20],
      225: [20,20,20,20,20,25,25,25,25,25],
      235: [75,15,15,15,15,20,20,20,20,20],
      285: [100,15,15,15,15,25,25,25,25,25],
      355: [150,20,20,20,20,25,25,25,25,25]
    }
  };

  return table[rarity]?.[totalNp] || null;
}

function getTalentTotalNp(talent) {
  return sumNpText(talent["消費NP"]);
}

function getTalentMaxLevel(char, talent) {
  const totalNp = getTalentTotalNp(talent);
  const levelList = getLevelNpList(char["レアリティ"], totalNp);

  return levelList ? levelList.length : 0;
}

function getUsedNpByLevel(char, talent, level) {
  const totalNp = getTalentTotalNp(talent);
  const levelList = getLevelNpList(char["レアリティ"], totalNp);

  // レベルなし本能
  if (!levelList) {
    return level > 0 ? totalNp : 0;
  }

  return levelList
    .slice(0, level)
    .reduce((sum, v) => sum + v, 0);
}

  function getCharacterTotalNp(char) {
  const talents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return talents.reduce((sum, t) => {
    return sum + sumNpText(t["消費NP"]);
  }, 0);
}

  function getCharacterNonResistanceNp(char) {

  const talents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return talents.reduce((sum, t) => {

    if (isResistanceTalent(t["能力名"])) {
      return sum;
    }

    return sum + sumNpText(t["消費NP"]);

  }, 0);
}

  function getCharacterRemainingNp(char) {
  const unlocked = loadUnlockedTalents();

  let totalNp = 0;
  let remainNp = 0;
  let remainNonResistanceNp = 0;

  ["本能", "超本能"].forEach(title => {
    const talents = char[title] || [];

    talents.forEach((talent, index) => {
      const key = makeTalentKey(char, title, index);

      const totalTalentNp = getTalentTotalNp(talent);
      const savedLevel = Number(unlocked[key] || 0);
      const usedNp = getUsedNpByLevel(char, talent, savedLevel);

      const remaining = totalTalentNp - usedNp;

      totalNp += totalTalentNp;
      remainNp += remaining;

      if (!isResistanceTalent(talent["能力名"])) {
        remainNonResistanceNp += remaining;
      }
    });
  });

  return {
    totalNp,
    remainNp,
    remainNonResistanceNp
  };
}

  function getUnlockedNpTotal(targetCharacters) {
  const unlocked = loadUnlockedTalents();

  let total = 0;

  targetCharacters.forEach(char => {
    ["本能", "超本能"].forEach(title => {
      const talents = char[title] || [];

      talents.forEach((t, index) => {
        const key = makeTalentKey(char, title, index);
        const level = Number(unlocked[key] || 0);

        total += getUsedNpByLevel(char, t, level);
      });
    });
  });

  return total;
}

  function getRemainingNpForStarredCharacters(targetCharacters) {
  let totalNp = 0;
  let nonResistanceNp = 0;

  const unlocked = loadUnlockedTalents();
  const starTalents = loadStarTalents();

  targetCharacters.forEach(char => {
    if (!isCharacterStarred(char)) return;

    ["本能", "超本能"].forEach(title => {
      const talents = char[title] || [];

      talents.forEach((talent, index) => {
        const key = makeTalentKey(char, title, index);

        if (!starTalents[key]) return;

        const savedLevel = Number(unlocked[key] || 0);
        const totalTalentNp = getTalentTotalNp(talent);
        const usedNp = getUsedNpByLevel(char, talent, savedLevel);
        const remainNp = totalTalentNp - usedNp;

        if (remainNp <= 0) return;

        totalNp += remainNp;

        if (!isResistanceTalent(talent["能力名"])) {
          nonResistanceNp += remainNp;
        }
      });
    });
  });

  return {
    totalNp,
    nonResistanceNp
  };
}

function isResistanceTalent(name) {
  const text = normalizeText(name);

  // ○○耐性を除外
  // 例：赤い敵耐性、浮いてる敵耐性、エイリアン耐性 など
  return text.includes("耐性");
}

  function normalizeText(text) {

  return String(text ?? "")

    // 全角英数字・半角カナ統一
    .normalize("NFKC")

    // カタカナ → ひらがな
    .replace(/[\u30A1-\u30F6]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0x60)
    )

    .toLowerCase()

    // 空白削除
    .replace(/\s+/g, "")

    // ハイフン系統一
    .replace(/[‐-‒–—―ー]/g, "-");
}

function escapeHtml(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

  function escapeAttr(text) {
  return String(text ?? "")
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function toggleCharacterStar(characterId) {
  const char = characters.find(c => String(c["ID"]) === String(characterId));
  if (!char) return;

  const starChars = loadStarCharacters();
  const starTalents = loadStarTalents();
  const unlocked = loadUnlockedTalents();

  const charKey = makeCharacterStarKey(char);
  const willStar = !starChars[charKey];

  if (willStar) {
    starChars[charKey] = true;

    ["本能", "超本能"].forEach(title => {
      const talents = char[title] || [];

      talents.forEach((talent, index) => {
        const key = makeTalentKey(char, title, index);
        const level = Number(unlocked[key] || 0);

        if (!isTalentMax(char, talent, level)) {
          starTalents[key] = true;
        }
      });
    });

  } else {
    delete starChars[charKey];

    ["本能", "超本能"].forEach(title => {
      const talents = char[title] || [];

      talents.forEach((talent, index) => {
        const key = makeTalentKey(char, title, index);
        delete starTalents[key];
      });
    });
  }

  saveStarCharacters(starChars);
  saveStarTalents(starTalents);

  renderList();
}

  function updateTalentBoxColor(box, level, maxLevel) {

  box.classList.remove("talent-max", "talent-partial");

    if (level >= maxLevel) {

    } else {
      box.classList.add("talent-partial");
    }
  } else {
    box.classList.add("talent-max");

  function unlockAllTalents(characterId) {

  if (!char) {
    return;
  }

  ["本能", "超本能"].forEach(title => {

    const talents = char[title] || [];

    talents.forEach((talent, index) => {

      const key = makeTalentKey(char, title, index);

      const maxLevel = getTalentMaxLevel(char, talent);

      // レベルあり → MAX
      if (maxLevel > 0) {
        data[key] = maxLevel;
      }
      // レベルなし → ON
      else {
        data[key] = 1;
      }

    });

  });

  saveUnlockedTalents(data);

  refreshVisibleTalentStates();
  updateRemainingMeta(characterId);
  updateNpSummary(getRarityFilteredCharacters());
  updateUnlockAllButtons();
}

  function unlockNonResistanceTalents(characterId) {

  }

      const key = makeTalentKey(char, title, index);

      const maxLevel =
        getTalentMaxLevel(char, talent);

      // レベルあり
      if (maxLevel > 0) {
        data[key] = maxLevel;
      }
      // レベルなし
      else {

      }

    });

  });

  saveUnlockedTalents(data);

  function isCharacterFullyUnlocked(char) {

  const unlocked = loadUnlockedTalents();

  const allTalents = [
    ...(char["本能"] || []),
    ...(char["超本能"] || [])
  ];

  return allTalents.every((talent, index) => {

    const title =
      index < (char["本能"] || []).length
        ? "本能"
        : "超本能";

    const talentIndex =
      title === "本能"
        ? index
        : index - (char["本能"] || []).length;

    const key = makeTalentKey(char, title, talentIndex);

    const savedLevel = Number(unlocked[key] || 0);

    const maxLevel = getTalentMaxLevel(char, talent);

    // レベルあり
    if (maxLevel > 0) {
      return savedLevel >= maxLevel;
    }

    // レベルなし
    return savedLevel > 0;
  });
}

  function isCharacterNonResistanceUnlocked(char) {

  const unlocked = loadUnlockedTalents();

  const allTalents = [
    ...(char["本能"] || []).map(t => ({
      title: "本能",
      talent: t
    })),

    ...(char["超本能"] || []).map(t => ({
      title: "超本能",
      talent: t
    }))
  ];

  return allTalents
    .filter(({ talent }) =>
      !isResistanceTalent(talent["能力名"])
    )
    .every(({ title, talent }, filteredIndex) => {

      const talents =
        char[title] || [];

      const talentIndex =
        talents.indexOf(talent);

      const key =
        makeTalentKey(char, title, talentIndex);

      const savedLevel =
        Number(unlocked[key] || 0);

      const maxLevel =
        getTalentMaxLevel(char, talent);

      // レベルあり
      if (maxLevel > 0) {
        return savedLevel >= maxLevel;
      }

      // レベルなし
      return savedLevel > 0;
    });
}

  function updateUnlockAllButtons() {

  // 全開放
  document.querySelectorAll(".unlock-all-button")
    .forEach(button => {

      const characterId =
        button.dataset.characterId;

      const char = characters.find(
        c => String(c["ID"]) === String(characterId)
      );

      if (!char) return;

      const fullyUnlocked =
        isCharacterFullyUnlocked(char);

      button.classList.toggle(
        "unlock-complete",
        fullyUnlocked
      );

      button.disabled = fullyUnlocked;
    });

  // 耐性以外
  document.querySelectorAll(".unlock-nonresist-button")
    .forEach(button => {

      const characterId =
        button.dataset.nonresistCharacterId;

      const char = characters.find(
        c => String(c["ID"]) === String(characterId)
      );

      if (!char) return;

      const unlocked =
        isCharacterNonResistanceUnlocked(char);

      button.classList.toggle(
        "unlock-complete",
        unlocked
      );

      button.disabled = unlocked;
    });
}

  function refreshVisibleTalentStates() {
  document.querySelectorAll(".talent").forEach(box => {
    const key = box.dataset.key;
    const charId = box.dataset.charId;
    const title = box.dataset.title;
    const index = Number(box.dataset.index);

    const char = characters.find(c => String(c["ID"]) === String(charId));
    if (!char) return;

    const talent = char[title]?.[index];
    if (!talent) return;

    const unlocked = loadUnlockedTalents();
    const level = Number(unlocked[key] || 0);

    const totalNp = getTalentTotalNp(talent);
    const maxLevel = getTalentMaxLevel(char, talent);
    const usedNp = getUsedNpByLevel(char, talent, level);

    const npText = box.querySelector(".talent-np");
    const select = box.querySelector(".talent-level");
    const checkbox = box.querySelector(".talent-check");

    if (npText) {
      if (maxLevel > 0 && level > 0 && level < maxLevel) {
        npText.textContent = `${usedNp}/${totalNp}NP`;
      } else {
        npText.textContent = `NP:${totalNp}`;
      }
    }

    if (select) {
      select.value = String(level);
    }

    if (checkbox) {
      checkbox.checked = maxLevel > 0 ? level >= maxLevel : level > 0;
    }

    updateTalentBoxColor(box, level, maxLevel);
  });
}

  function resetCharacterTalents(characterId) {

  const char = characters.find(
    c => String(c["ID"]) === String(characterId)
  );

  if (!char) return;

  const ok = confirm(
    `${char["キャラ名"]} の本能開放状況をリセットしますか？`
  );

  if (!ok) return;

  const data = loadUnlockedTalents();

  ["本能", "超本能"].forEach(title => {
    const talents = char[title] || [];

    talents.forEach((talent, index) => {
      const key = makeTalentKey(char, title, index);
      delete data[key];
    });
  });

  saveUnlockedTalents(data);

  refreshVisibleTalentStates();
  updateRemainingMeta(characterId);
  updateNpSummary(getRarityFilteredCharacters());
  updateUnlockAllButtons();
}

  // 本能ごとに星
  function getTalentStarSaveKey() {
  return `nyanko_talent_star_talents_${getCurrentAccountId()}`;
}

function loadStarTalents() {
  try {
    return JSON.parse(localStorage.getItem(getTalentStarSaveKey())) || {};
  } catch {
    return {};
  }
}

function saveStarTalents(data) {
  localStorage.setItem(getTalentStarSaveKey(), JSON.stringify(data));
}

  function isTalentMax(char, talent, level) {
  const maxLevel = getTalentMaxLevel(char, talent);

  if (maxLevel > 0) {
    return level >= maxLevel;
  }

  return level > 0;
}

  function toggleTalentStar(key) {
  const starTalents = loadStarTalents();

  if (starTalents[key]) {
    delete starTalents[key];
  } else {
    starTalents[key] = true;
  }

  saveStarTalents(starTalents);

  const button = document.querySelector(
    `.talent-star-button[data-talent-key="${CSS.escape(key)}"]`
  );

  if (button) {
    const on = !!starTalents[key];
    button.classList.toggle("talent-star-on", on);
    button.textContent = on ? "★" : "☆";
  }

  updateCharacterStarByTalentStars(key);
  updateNpSummary(getRarityFilteredCharacters());
}
  
  function updateCharacterStarByTalentStars(key) {
  const parts = key.split("_");
  const charId = parts[0];

  const char = characters.find(c => String(c["ID"]) === String(charId));
  if (!char) return;

  const starTalents = loadStarTalents();
  const starChars = loadStarCharacters();

  const hasAnyTalentStar = ["本能", "超本能"].some(title => {
    const talents = char[title] || [];

    return talents.some((talent, index) => {
      const talentKey = makeTalentKey(char, title, index);
      return !!starTalents[talentKey];
    });
  });

  const charKey = makeCharacterStarKey(char);

  if (hasAnyTalentStar) {
    starChars[charKey] = true;
  } else {
    delete starChars[charKey];
  }

  saveStarCharacters(starChars);

  const charStarButton = document.querySelector(
    `.star-button[data-character-id="${CSS.escape(String(char["ID"]))}"]`
  );

  if (charStarButton) {
    charStarButton.classList.toggle("star-on", hasAnyTalentStar);
    charStarButton.textContent = hasAnyTalentStar ? "★" : "☆";
  }
}

  function syncTalentStarsFromCharacterStars() {
  const starChars = loadStarCharacters();
  const starTalents = loadStarTalents();
  const unlocked = loadUnlockedTalents();

  let changed = false;

  characters.forEach(char => {
    if (!isCharacterStarred(char)) return;

    ["本能", "超本能"].forEach(title => {
      const talents = char[title] || [];

      talents.forEach((talent, index) => {
        const key = makeTalentKey(char, title, index);
        const level = Number(unlocked[key] || 0);

        // MAX済みなら本能★は付けない
        if (isTalentMax(char, talent, level)) {
          if (starTalents[key]) {
            delete starTalents[key];
            changed = true;
          }
          return;
        }

        // 未MAXなら本能★を付ける
        if (!starTalents[key]) {
          starTalents[key] = true;
          changed = true;
        }
      });
    });
  });

  if (changed) {
    saveStarTalents(starTalents);
  }
}

  // 開放フィルター
  function getCharacterUnlockStatus(char) {
  const unlocked = loadUnlockedTalents();

  let totalCount = 0;
  let openedCount = 0;
  let fullCount = 0;

  ["本能", "超本能"].forEach(title => {
    const talents = char[title] || [];

    talents.forEach((talent, index) => {
      totalCount++;

      const key = makeTalentKey(char, title, index);
      const level = Number(unlocked[key] || 0);

      if (level > 0) {
        openedCount++;
      }

      if (isTalentMax(char, talent, level)) {
        fullCount++;
      }
    });
  });

  return {
    totalCount,
    openedCount,
    fullCount,
    isOpened: openedCount > 0,
    isFull: totalCount > 0 && fullCount === totalCount,
    isNone: openedCount === 0
  };
}

  // Ver
  function compareVersion(a, b) {

  const pa = String(a || "0")
    .split(".")
    .map(Number);

  const pb = String(b || "0")
    .split(".")
    .map(Number);

  const length =
    Math.max(pa.length, pb.length);

  for (let i = 0; i < length; i++) {

    const va = pa[i] || 0;
    const vb = pb[i] || 0;

    if (va !== vb) {
      return va - vb;
    }
  }

  return 0;
}
